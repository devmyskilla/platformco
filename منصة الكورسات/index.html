<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="siteName">دنيا الدورات</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%231B1464'/%3E%3Cstop offset='100%25' stop-color='%236C5CE7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='white' stroke-width='4'/%3E%3Cellipse cx='50' cy='50' rx='15' ry='30' fill='none' stroke='white' stroke-width='3'/%3E%3Cline x1='20' y1='50' x2='80' y2='50' stroke='white' stroke-width='3'/%3E%3Cpath d='M30 35 Q50 30 70 35' fill='none' stroke='white' stroke-width='2'/%3E%3Cpath d='M30 65 Q50 70 70 65' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="header-left">
        <a href="index.html" class="logo-link"><h1 class="logo" data-i18n="siteName">دنيا الدورات</h1></a>
        <p class="tagline" data-i18n="tagline">اكتشف وتصفح أفضل منصات التعلم المجانية والمدفوعة</p>
      </div>
      <div class="header-right lang-wrap">
        <select id="langSwitcher" class="lang-select">
          <option value="ar">العربية</option>
          <option value="en">English</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="filters">
        <div class="filter-group">
          <label for="filterLang" data-i18n="filterLanguage">اللغة</label>
          <select id="filterLang"><option value="">الكل</option></select>
        </div>
        <div class="filter-group">
          <label for="filterCategory" data-i18n="filterCategory">التصنيف</label>
          <select id="filterCategory"><option value="">الكل</option></select>
        </div>
        <div class="filter-group check-group">
          <label class="check-label">
            <input type="checkbox" id="filterFree"> <span data-i18n="freeOnly">مجاني فقط</span>
          </label>
          <label class="check-label">
            <input type="checkbox" id="filterCert"> <span data-i18n="withCertificate">بشهادة</span>
          </label>
        </div>
        <button id="resetFilters" class="btn-reset" data-i18n="reset">إعادة تعيين</button>
      </div>
      <div class="results-bar">
        <span id="resultsCount">0</span> <span data-i18n="platformsAvailable">منصة متاحة</span>
      </div>
    </section>

    <section class="courses-grid" id="coursesGrid">
      <div class="loading" data-i18n="loading">جاري التحميل...</div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p data-i18n="footer">جميع الحقوق محفوظة © 2026 دنيا الدورات</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
